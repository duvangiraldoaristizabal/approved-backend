services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: approved
      POSTGRES_USER: approved
      POSTGRES_PASSWORD: approved
    ports:
      - "5432:5432"
    volumes:
      - approved_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U approved -d approved"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  approved_postgres_data:
